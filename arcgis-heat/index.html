<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Display a heat map</title>
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- Load Esri Leaflet from CDN -->
    <script src="https://unpkg.com/esri-leaflet@3.0.19/dist/esri-leaflet.js"></script>

    <!-- Load Esri Leaflet Vector from CDN -->
    <script src="https://unpkg.com/esri-leaflet-vector@4.3.2/dist/esri-leaflet-vector.js" crossorigin=""></script>
    <style>
      html,
      body {
        margin:0;
        padding:0;
      }
      #map {
        position: absolute;
        top:0;
        bottom:0;
        right:0;
        left:0;
      }
      #map-title {
        position: relative;
        margin-top: 10px;
        margin-left: 50px;
        float: left;
        background: white;
        border: 2px solid rgba(0,0,0,0.2);
        padding: 6px 8px;
        font-family: Helvetica;
        font-weight: bold;
        font-size: 24px;
        z-index: 800;
      }
    </style>
  </head>
  <body>
    <!-- Include Leaflet.heat from CDN -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <!-- Load Heatmap Feature Layer from CDN -->
    <script src="https://unpkg.com/esri-leaflet-heatmap@2.0.0"></script>
    <div id="map-title">ArcGIS test</div>
    <div id="map"></div>
    <script>
      const accessToken = "ec8787f547c34f4694a13435df1d8165";

      const map = L.map("map", {
        maxZoom: 16 // the heatmap plugin needs some help understanding the map's maxZoom
      }).setView([42.34, -71.09], 14);

      /* display basemap tiles -- see others at https://leaflet-extras.github.io/leaflet-providers/preview/ */
      L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; <a href="https://osm.org/copyright">\
            OpenStreetMap</a> contributors, &copy;\
            <a href="https://carto.com/attribution">CARTO</a>'
      }).addTo(map);

      // new esri.Heat constructor syntax at 2.0.0
      L.esri.Heat.featureLayer({
        url: "https://gis.crashdata.dot.mass.gov/arcgis/rest/services/MassDOT/MASSDOT_ODP_OPEN_2024/FeatureServer/0/",
        radius: 10
      }).addTo(map);

    </script>
  </body>
</html>
